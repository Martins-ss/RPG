kind = "web"
previewPath = "/"
title = "O Reino do Rei Sombrio"
version = "1.0.0"
id = "artifacts/rpg-companion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19814

[services.development]
run = "pnpm --filter @workspace/rpg-companion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rpg-companion", "run", "build" ]
publicDir = "artifacts/rpg-companion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19814"
BASE_PATH = "/"
